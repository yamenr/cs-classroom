<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="100" cy="100" r="95" fill="url(#grad)" />
  <!-- Graduation cap - top diamond -->
  <polygon points="100,38 160,68 100,98 40,68" fill="#ffffff" opacity="0.95"/>
  <!-- Graduation cap - tassel line -->
  <line x1="140" y1="58" x2="155" y2="85" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <circle cx="155" cy="88" r="5" fill="#ffffff"/>
  <!-- Cap band -->
  <path d="M60,72 L60,95 Q100,120 140,95 L140,72" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.8"/>
  <!-- Code brackets </> -->
  <text x="100" y="155" text-anchor="middle" font-family="Courier New, monospace" font-size="42" font-weight="bold" fill="#ffffff" opacity="0.95">&lt;/&gt;</text>
</svg>